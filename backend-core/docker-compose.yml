version: '3.9'

services:
  mysql:
    image: mysql:8.4
    container_name: worklify-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: worklify_db
      MYSQL_USER: worklify
      MYSQL_PASSWORD: worklify_password
    ports:
      - "3307:3306" # Map ra ngoài máy host ở port 3307 để không trùng MySQL có sẵn
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - worklify-network

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: worklify-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root123
    ports:
      - "8081:80"
    networks:
      - worklify-network

networks:
  worklify-network:
    driver: bridge

volumes:
  mysql_data: