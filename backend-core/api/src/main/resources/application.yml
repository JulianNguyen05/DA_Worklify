spring:
  application:
    name: smartmatch-api

  datasource:
    # Chạy trên IDE gọi vào MySQL Docker qua cổng 3307
    url: jdbc:mysql://localhost:3307/smartmatch_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root123 # Khớp với biến môi trường trong docker-compose
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  # [ĐÃ THÊM] Cấu hình RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  security:
    jwt:
      # [ĐÃ SỬA] Chuỗi secret key đã được mã hóa chuẩn Base64 để tránh lỗi của jjwt library
      secret: c21hcnRtYXRjaC1zdXBlci1zZWNyZXQta2V5LTIwMjYtbWluaW11bS0yNTYtYml0cyE=
      expiration: 86400000
      refresh-expiration: 604800000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

logging:
  level:
    com.smartmatch: DEBUG
    org.hibernate.SQL: DEBUG